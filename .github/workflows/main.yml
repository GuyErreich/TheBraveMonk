name: Build and Test Unreal Project

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: eu-central-1
  
jobs:
  start_ecs_service:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::961341519925:role/GitHubActionsECSUpdateRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Check Runner Availability
        id: check_runner_availability
        run: |
          available=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/actions/runners \
            | jq '.runners[] | select(.labels[].name == "self-hosted, linux, ue")')
          echo "There are available runner: $available"
          echo "available=$( [[ -n "$available" ]] && echo true || echo false )" >> $GITHUB_OUTPUT

      - name: Check desired count
        id: check_desired_count
        if: ${{ ! steps.check_runner_availability.outputs.available }}
        run: |
          desired_count=$(aws ecs describe-services \
          --cluster fargate-cluster \
          --services unreal_engine \
          | jq ".services[] | select(.serviceName == \"unreal_engine\") | .desiredCount")
          echo "Desired count is $desired_count"
          echo "desired_count=$desired_count" >> $GITHUB_OUTPUT
        

      - name: Update ECS service desired count
        if: ${{ ! steps.check_runner_availability.outputs.available }}
        run: |
          desired_count=$((${{steps.check_desired_count.outputs.desired_count}} + 1))
          aws ecs update-service \
            --cluster fargate-cluster \
            --service unreal_engine \
            --desired-count $desired_count
      
  build:
    runs-on: [self-hosted, linux]  # Use a GitHub-hosted runner
    needs: [start_ecs_service]
    permissions: read-all
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Hello World
        run: echo 'Hello World!'
        
      - name: Show unreal engine folder
        run: ls -la

      - name: Build project
        run: task -d $HOME build
